<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PI4 Microfinance API Docs</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Swagger UI default styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <!-- Project customizations (module highlighting, etc.) -->
    <link rel="stylesheet" href="/custom-swagger.css" />

    <style>
      :root {
        --pi-bg: #f8faf9;
        --pi-card: #ffffff;
        --pi-primary: #16a34a;
        --pi-primary-soft: rgba(22, 163, 74, 0.1);
        --pi-border: rgba(15, 23, 42, 0.08);
        --pi-text: #0f172a;
        --pi-muted: #64748b;
      }

      body {
        margin: 0;
        background: var(--pi-bg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }

      .swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }

      /* Top header similar to GroupsPaymentsModule */
      .pi-header {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1.5rem;
      }

      .pi-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--pi-text);
      }

      .pi-subtitle {
        font-size: 0.95rem;
        color: var(--pi-muted);
      }

      .swagger-ui .topbar {
        display: none;
      }

      /* Hide Swagger UI’s duplicate title/description (we use .pi-header above) */
      .swagger-ui .information-container,
      .swagger-ui .info {
        display: none;
      }

      .swagger-ui .scheme-container {
        border-radius: 0.75rem;
        border: 1px solid var(--pi-border);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.96),
          rgba(248, 250, 249, 0.98)
        );
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      .swagger-ui .opblock {
        border-radius: 0.75rem;
        border-width: 1px;
        border-color: var(--pi-border);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      .swagger-ui .opblock-summary {
        padding: 12px 18px;
      }

      .swagger-ui .opblock .opblock-summary-method {
        border-radius: 999px;
        padding: 4px 14px;
        font-weight: 600;
      }

      .swagger-ui .opblock-tag {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--pi-text);
      }

      .swagger-ui .opblock-tag small {
        color: var(--pi-muted);
      }

      .swagger-ui .btn.execute.opblock-control__btn {
        background: var(--pi-primary);
        border-radius: 999px;
        border: none;
        box-shadow: 0 10px 25px rgba(22, 163, 74, 0.4);
      }

      .swagger-ui .btn.execute.opblock-control__btn:hover {
        background: #15803d;
      }

      .swagger-ui .curl-command {
        border-radius: 0.5rem;
        background: #020617;
      }

      .swagger-ui .model-box {
        border-radius: 0.5rem;
      }

      .pi-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 500;
        background: var(--pi-primary-soft);
        color: var(--pi-primary);
        border: 1px solid rgba(22, 163, 74, 0.35);
      }

      .pi-badge-dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: var(--pi-primary);
      }
    </style>
  </head>

  <body>
    <div class="swagger-ui">
      <header class="pi-header">
        <div class="pi-badge">
          <span class="pi-badge-dot"></span>
          All modules · API reference
        </div>
        <h1 class="pi-title">PI4 Microfinance API</h1>
        <p class="pi-subtitle">
          Backend endpoints grouped by module (Groups, Pre‑Registration, Score, Admin).
        </p>
      </header>

      <div id="swagger-ui-root"></div>
    </div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      function moduleKeyFromTag(tag) {
        if (!tag) return "other";
        const t = String(tag).toLowerCase();
        if (t.startsWith("module 1")) return "module1";
        if (t.includes("pre-registration") || t.includes("pre registration") || t.includes("pré-inscription") || t.startsWith("module 5")) return "module5";
        if (t.includes("score") || t.includes("adherence") || t.includes("reward") || t.includes("claim")) return "score";
        if (t.includes("admin") || t.includes("system alert") || t.includes("dashboard")) return "admin";
        // Map a few existing tags that don't have module prefix
        if (t === "memberships") return "module1";
        if (t.includes("group change request")) return "module1";
        return "other";
      }

      function moduleOrder(key) {
        return {
          module1: 10,
          module5: 20,
          score: 30,
          admin: 40,
          other: 90,
        }[key] ?? 90;
      }

      function humanModuleLabel(key) {
        return {
          module1: "Module 1 · Groups",
          module5: "Module 5 · Pre‑Registration",
          score: "Module · Score",
          admin: "Module · Admin",
          other: "Other",
        }[key] ?? "Other";
      }

      function applyModuleClasses(root) {
        if (!root) return;
        const sections = root.querySelectorAll(".opblock-tag-section");
        sections.forEach((section) => {
          const h4 = section.querySelector(".opblock-tag");
          const tagText = h4 ? h4.textContent.trim() : "";
          const key = moduleKeyFromTag(tagText);
          section.dataset.piModule = key;
          section.dataset.piModuleLabel = humanModuleLabel(key);
        });
      }

      function injectModuleDividers(root) {
        if (!root) return;
        // Remove previous dividers
        root.querySelectorAll(".pi-module-divider").forEach((n) => n.remove());

        const sections = Array.from(root.querySelectorAll(".opblock-tag-section"));
        if (!sections.length) return;

        // Sort sections as they appear and add a divider when module changes
        let lastKey = null;
        sections.forEach((section) => {
          const key = section.dataset.piModule || "other";
          if (key !== lastKey) {
            const divider = document.createElement("div");
            divider.className = "pi-module-divider";
            divider.dataset.piModule = key;
            divider.textContent = section.dataset.piModuleLabel || humanModuleLabel(key);
            section.parentNode.insertBefore(divider, section);
            lastKey = key;
          }
        });
      }

      window.onload = () => {
        const ui = SwaggerUIBundle({
          url: "/v3/api-docs",
          dom_id: "#swagger-ui-root",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout",
          tagsSorter: (a, b) => {
            const ka = moduleKeyFromTag(a);
            const kb = moduleKeyFromTag(b);
            const oa = moduleOrder(ka);
            const ob = moduleOrder(kb);
            if (oa !== ob) return oa - ob;
            return a.localeCompare(b, undefined, { sensitivity: "base" });
          },
        });

        // Add module styling after render (and on updates)
        const root = document.querySelector("#swagger-ui-root");
        const observer = new MutationObserver(() => {
          applyModuleClasses(root);
          injectModuleDividers(root);
        });
        observer.observe(root, { childList: true, subtree: true });
        // Initial pass
        applyModuleClasses(root);
        injectModuleDividers(root);
      };
    </script>
  </body>
</html>
