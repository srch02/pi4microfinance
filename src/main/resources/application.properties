spring.application.name=piversionbd
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Production: set SPRING_DATASOURCE_* (and PORT) in the environment or .env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pidb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
server.port=${PORT:8080}
# Run data.sql after Hibernate creates/updates schema (seed admin + group + member)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Mail — set MAIL_USERNAME / MAIL_PASSWORD in production
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${spring.mail.username}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT — set JWT_SECRET in production
security.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-change-this}
security.jwt.expiration-ms=3600000

# AES-256 — set SECURITY_AES_KEY in production
security.aes.key=${SECURITY_AES_KEY:change-this-aes-key-change-this-aes-key}

# Hedera — set operator key via env in production
hedera.enabled=${HEDERA_ENABLED:true}
hedera.network=${HEDERA_NETWORK:testnet}
hedera.operator-account-id=${HEDERA_OPERATOR_ACCOUNT_ID:}
hedera.operator-private-key=${HEDERA_OPERATOR_PRIVATE_KEY:}
hedera.topic-contracts=${HEDERA_TOPIC_CONTRACTS:}
hedera.topic-transactions=${HEDERA_TOPIC_TRANSACTIONS:}
hedera.contract-id=${HEDERA_CONTRACT_ID:}
logging.level.pi.db.piversionbd=DEBUG
logging.level.com.hedera=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packages-to-scan=pi.db.piversionbd.controller

claims.auto-score-on-submit=true

telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:true}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}

recaptcha.enabled=${RECAPTCHA_ENABLED:true}
recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}
recaptcha.min-score=0.5

# Google Cloud Vision (admin medical form OCR). Requires GOOGLE_APPLICATION_CREDENTIALS when enabled.
ml.vision.enabled=${ML_VISION_ENABLED:false}
