#configuration base de donne
spring.application.name=piversionbd
spring.datasource.url=jdbc:mysql://localhost:3306/pidb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
#configurayion JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
#port du serveur
server.port=8080
#Configuration pour eviter les erreures
spring.jpa.open-in-view=false
# Configuration Swagger UI (un seul document, pas de groupe "default")
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packages-to-scan=pi.db.piversionbd.controller